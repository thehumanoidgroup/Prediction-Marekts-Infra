services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proppredict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proppredict}
      POSTGRES_DB: ${POSTGRES_DB:-proppredict}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      PP_ENVIRONMENT: ${PP_ENVIRONMENT:-development}
      PP_SECRET_KEY: ${PP_SECRET_KEY:-change-me-in-production}
      PP_DATABASE_URL: ${PP_DATABASE_URL:-postgresql+asyncpg://proppredict:proppredict@postgres:5432/proppredict}
      PP_REDIS_URL: ${PP_REDIS_URL:-redis://redis:6379/0}
      PP_CORS_ORIGINS: ${PP_CORS_ORIGINS:-["http://localhost:3000"]}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
